        :root {
            --font-size-1: 0.75rem;
            --font-size-2: 0.75rem;
            --font-size-3: 1rem;
            --font-size-4: 1.25rem;
            --font-size-5: 1.5rem;
            --font-size-6: 2rem;
            --font-size-7: 2.5rem;
            --font-size-8: 3rem;
            --font-size-9: 4rem;
            --font-size-10: 5rem;
            --base-pixel-size: 12px;
            --grey: #111;
            --yellow-action: #ffbb00;
            --white: #FFF;
        }

        body {
            font-family: 'Oswald', sans-serif;
            background-color: var(--grey);
            color: var(--white);
            min-height: 100vh;
            font-size: var(--base-pixel-size);
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
        }

        .header {
            display: flex;
            align-items: center;
            padding: calc(var(--base-pixel-size) * 1.5) calc(var(--base-pixel-size) * 4);
            background-color: rgba(0,0,0,.85);
            backdrop-filter: blur(25px);
        }

        .logo img {
            height: 20px;
            width: auto;
        }

        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: calc(var(--base-pixel-size) * 4);
            text-align: center;
        }

        h1 {
            font-size: var(--font-size-7);
            font-weight: 700;
            margin-bottom: calc(var(--base-pixel-size) * 1.5);
            line-height: 1.2;
        }

        p {
            font-size: var(--font-size-4);
            color: var(--white);
            line-height: 1.5;
            margin-bottom: calc(var(--base-pixel-size) * 2);
        }

        .captcha-wrapper {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: calc(var(--base-pixel-size) * 3);
            margin-top: calc(var(--base-pixel-size) * 2);
            max-width: 400px;
            width: 100%;
        }

        .captcha-wrapper * {
            color: var(--white);
        }

        .captcha-wrapper .footer {
            background-color: transparent;
            padding: calc(var(--base-pixel-size) * 1.5) 0 0;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: calc(var(--base-pixel-size) * 1.5);
            font-size: var(--font-size-1);
        }

        .captcha-wrapper .footer a {
            color: var(--white);
            text-decoration: underline;
        }

        .captcha-wrapper .footer a:hover {
            color: var(--yellow-action);
        }

        @media (max-width: 768px) {
            .header {
                padding: var(--base-pixel-size) calc(var(--base-pixel-size) * 2);
            }

            .content {
                padding: calc(var(--base-pixel-size) * 2);
            }

            h1 {
                font-size: var(--font-size-6);
            }

            p {
                font-size: var(--font-size-3);
            }
        }
    </style>
