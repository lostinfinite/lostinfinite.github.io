name: Deploy WebKit Website to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y wget curl jq

      - name: Debug: List Repository Files
        run: ls -la  # This will help debug missing files

      - name: Copy Assets (if exists)
        run: |
          mkdir -p static_site
          if [ -d "Assets" ]; then
            echo "Assets directory found. Copying..."
            cp -r Assets static_site/
          else
            echo "Warning: Assets directory not found. Skipping copy."
          fi

      - name: Convert Dynamic Content to Static HTML
        run: |
          wget --mirror --convert-links --adjust-extension --page-requisites --no-parent https://your-webkit-site.com -P static_site/
        continue-on-error: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: static_site
