<!DOCTYPE html>
<html><head>
        <title>ContentLTD</title>
        <link href="https://cdn.contentltd.net/cltd.jpg" rel="icon">
        <style type="text/css">
            html {
                height: 100%;
            }

            body {
                background-color: #232527;
                color: white;
                text-shadow: 2px 2px 4px #000000;
                font-family: Open Sans, 'Source Sans Pro', sans-serif;
                height: auto;
                margin: 0;
                min-width: 320px;
                text-align: center;
                overflow: hidden;
                background-image: url("https://imagedelivery.net/kGAxGmhovFjft44aAIlSSQ/3669bb74-3d98-44d5-1137-6c3f81627b00/public");
                background-repeat: no-repeat;
                background-size: cover;
                background-position: center center;
            }
            
            body a {
                color: #fff;
            }
            
            .content {
                position: relative;
                height: 100%;
                text-align: center;
            }
            
            .container {
                width: 67.5%;
                max-width: 960px;
                min-width: 320px;
                height: 480px;
                margin: auto;
                position: absolute;
                top: 0;
                left: 0;
                bottom: 0;
                right: 0;
            }
            
            .header {
                position: absolute;
                width: 100%;
            }

            .maintenance-logo {
                width: 244px;
                margin: 0 auto;
                padding: 48px
            }
            
            .maintenance-center-container {
                display: table;
                width: 100%;
                height: 100%;
            }
            
            .maintenance-center {
                display: table-cell;
                vertical-align: middle;
            }
            
            .maintenance-title {
                font-size: 36px;
                font-weight: 700;
                line-height: 1.2em;
                padding-bottom: 12px;
            }
            
            .maintenance-subtitle {
                font-size: 16px;
            }
            
            .maintenance-status {
                padding: 48px;
                position: absolute;
                bottom: 0;
                right: 0;
                left: 0;
            }
            
            .maintenance-footer {
                position: absolute;
                bottom: 0;
                padding-bottom: 50px;
                width: 100%;
                text-align: center;
            }


        </style>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,regular,600">
  <body>
        <div class="container">
            <div class="content">
                <div class="header">
                    <a href="/"><img src="https://cdn.contentltd.net/cltd.jpg" alt="CLTD" class="maintenance-logo" id="logo" style="height: 100px; width: 100px;"></a>
                </div>
                
                <div class="maintenance-center-container">
                    <div class="maintenance-center">
                        <div class="maintenance-title">Under Construction...</div>
                        <div class="maintenance-subtitle">
                            <p>This website is under construction.</p>
                            <p>New features inbound, check back soon!</p>
                        </div>
                    </div>
                </div>
                
                <div class="maintenance-status">Please visit our <a href="https://discord.gg/MtWakXj9Cm">Discord server</a> for more information.</div>
            </div>
        </div>
        
    

</body></html>
